<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alice in Borderlands — DeadLeaf</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="css/theme-vars.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/title.css">
  <link rel="stylesheet" href="css/ad-modal.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="top-left">
    <span id="menu-btn" aria-label="Open menu">☰</span>
    <span class="brand">DeadLeaf</span>
  </div>
  <div class="top-right">
    <button class="back-btn" data-navigate="back">Back</button>
    <!-- BOOKMARKS BUTTON -->
    <button id="bookmarks-toggle" class="icon-btn" aria-label="Bookmarks">
      <i class="fas fa-bookmark"></i>
      <span class="bookmark-count-badge" id="bookmark-count-badge">0</span>
    </button>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <img src="images/deadleaf.png" alt="DeadLeaf" class="sidebar-logo">
    <span id="close-btn" aria-label="Close menu">✕</span>
  </div>
  <a href="#" data-navigate="home">Home</a>
  <a href="#" data-navigate="library">Library</a>
  <a href="#" id="sidebar-bookmarks">Bookmarks</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
  <a href="privacy.html">Privacy</a>
  <a href="profile.html">Profile</a>
  <a href="terms.html">Terms</a>
  <!-- Auth links - will be hidden when logged in -->
  <a href="login.html">Sign In</a>
  <a href="signup.html">Sign Up</a>
  <div class="theme-controls">
    <p>Theme</p>
    <div class="theme-switcher">
      <button data-set-theme="dark">Dark</button>
      <button data-set-theme="sepia">Sepia</button>
      <button data-set-theme="night">Night</button>
    </div>
  </div>
</div>

<!-- Overlay -->
<div id="overlay"></div>

<!-- BOOKMARKS PANEL (will be injected by JS) -->
<div id="bookmarks-panel" class="bookmarks-panel"></div>

<!-- Title Page -->
<div class="title-container">
  <!-- Top Section -->
  <div class="title-top">
    <!-- Cover -->
    <div class="cover-box">
      <div class="skeleton sk-cover"></div>
      <img src="" alt="Cover Image" hidden>
    </div>

    <!-- Info -->
    <div class="info-box">
      <div class="skeleton sk-title"></div>
      <div class="skeleton sk-small"></div>
      <div class="skeleton sk-text"></div>
      <div class="skeleton sk-small"></div>

      <div class="real-info" hidden>
        <h1 class="title-name"></h1>
        <p class="author"></p>
        <p class="warning"></p>
        <p class="status"></p>
      </div>
    </div>
  </div>

  <!-- Description -->
  <div class="desc-box">
    <div class="skeleton sk-title"></div>
    <div class="skeleton sk-text"></div>
    <div class="skeleton sk-text"></div>
    <div class="skeleton sk-small"></div>

    <div class="real-desc" hidden>
      <h3>Description</h3>
      <p class="desc-text"></p>
      <p class="total"></p>
    </div>
  </div>

  <!-- Chapter List -->
  <div class="chapters-box">
    <h3>Chapters</h3>
    
    <button id="continue-reading" class="primary-btn" style="display:none;">
      Continue Reading
    </button>

    <!-- Skeleton list -->
    <div id="chapter-skeletons">
      <div class="skeleton sk-chapter"></div>
      <div class="skeleton sk-chapter"></div>
      <div class="skeleton sk-chapter"></div>
      <div class="skeleton sk-chapter"></div>
      <div class="skeleton sk-chapter"></div>
    </div>

    <!-- Real chapters -->
    <div id="chapter-list" hidden></div>
  </div>
</div>

<!-- CORRECT SCRIPT ORDER - Replace your current script section -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/menu.js"></script>
<script src="js/theme.js"></script>
<script src="js/navigation.js"></script>
<script src="js/bookmarks.js"></script>
<script src="js/auth.js"></script>
<script src="js/auth-state.js"></script>
</body>
</html>
