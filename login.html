<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — DeadLeaf</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="css/theme-vars.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

  <!-- Top Bar - FIXED: Now uses text brand, no logo -->
  <div class="top-bar">
    <div class="menu-left">
      <span id="menu-btn" aria-label="Open menu">☰</span>
      <a href="index.html" class="brand-link" data-navigate="home">
        <span class="brand">DeadLeaf</span>
      </a>
    </div>
    <div class="menu-right">
      <button id="bookmarks-toggle" class="icon-btn" aria-label="Bookmarks">
        <i class="fas fa-bookmark"></i>
        <span class="bookmark-count-badge" id="bookmark-count-badge">0</span>
      </button>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <img src="images/deadleaf.png" alt="DeadLeaf" class="sidebar-logo">
    <span id="close-btn" aria-label="Close menu">✕</span>
  </div>
  <a href="#" data-navigate="home">Home</a>
  <a href="#" data-navigate="library">Library</a>
  <a href="#" id="sidebar-bookmarks">Bookmarks</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
  <a href="privacy.html">Privacy</a>
  <a href="terms.html">Terms</a>
  <!-- Auth links - will be hidden when logged in -->
  <a href="login.html">Sign In</a>
  <a href="signup.html">Sign Up</a>
  <div class="theme-controls">
    <p>Theme</p>
    <div class="theme-switcher">
      <button data-set-theme="dark">Dark</button>
      <button data-set-theme="sepia">Sepia</button>
      <button data-set-theme="night">Night</button>
    </div>
  </div>
</div>

  <!-- Overlay -->
  <div id="overlay" class="overlay"></div>

  <!-- Auth Container -->
  <div class="auth-container">
    <div class="auth-card">
      
      <!-- Header -->
      <h1 class="auth-title">welcome back</h1>
      <p class="auth-subtitle">Sign in to continue your reading journey</p>

      <!-- Login Form -->
      <form class="auth-form" id="login-form">
        <div class="auth-form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="auth-form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
          <button type="button" class="password-toggle" id="toggle-password">
            <i class="far fa-eye"></i>
          </button>
        </div>

        <div class="auth-options">
          <label class="remember-me">
            <input type="checkbox" name="remember"> 
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="auth-submit-btn">
          Sign In
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>or</span>
      </div>

      <!-- Social Login -->
      <div class="social-login">
        <button class="social-btn google">
          <i class="fab fa-google"></i>
          <span>Continue with Google</span>
        </button>
        <button class="social-btn github">
          <i class="fab fa-github"></i>
          <span>Continue with GitHub</span>
        </button>
      </div>

      <!-- Sign Up Link -->
      <p class="auth-redirect">
        Don't have an account? 
        <a href="signup.html">Create one</a>
      </p>
    </div>
  </div>

  <!-- Simple Footer -->
  <footer class="auth-footer">
    <p>© 2025 DeadLeaf — A Max Studios creation</p>
  </footer>

  <!--scripts-->
  <!-- CORRECT SCRIPT ORDER - Replace your current script section -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/menu.js"></script>
<script src="js/theme.js"></script>
<script src="js/navigation.js"></script>
<script src="js/auth.js"></script>
<script src="js/auth-state.js"></script>
</body>
</html>
